name: Auto Generate Content

on:
  schedule:
    - cron: '*/10 * * * *'
  workflow_dispatch:

jobs:
  run-auto-generate:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger scheduled auto-generate run
        env:
          API_URL: ${{ secrets.API_URL }}
          PIPELINE_SYNC_SECRET: ${{ secrets.PIPELINE_SYNC_SECRET }}
        run: |
          set -euo pipefail

          if [ -z "${API_URL:-}" ]; then
            echo "API_URL secret is missing"
            exit 1
          fi

          if [ -z "${PIPELINE_SYNC_SECRET:-}" ]; then
            echo "PIPELINE_SYNC_SECRET secret is missing"
            exit 1
          fi

          HTTP_CODE=$(curl -sS -o response.json -w "%{http_code}" -X POST "${API_URL}/api/pipeline/auto-generate/run" \
            -H "x-pipeline-secret: ${PIPELINE_SYNC_SECRET}")

          ERROR_CODE=$(jq -r '.errorCode // ""' response.json)
          ERROR_MESSAGE=$(jq -r '.message // .error // ""' response.json)

          OUTPUT_FILE="response.json"
          if [ "${HTTP_CODE}" -ge 400 ]; then
            if [ "${ERROR_CODE}" = "AUTO_GENERATE_RUN_FAILED" ] && \
              echo "${ERROR_MESSAGE}" | grep -qiE 'prisma\.account\.findMany|does not exist in the current database|P2022'; then
              echo "::warning::Auto-generate skipped because Account automation columns are missing in runtime database. Run DB migration and re-enable strict gate."
              echo "compatibility_skip=true" >> "$GITHUB_OUTPUT"
              OUTPUT_FILE="response-compatibility-skip.json"
              cat > "${OUTPUT_FILE}" <<'JSON'
          {"success":true,"compatibilitySkip":true,"message":"Skipped auto-generate because runtime database schema is missing Account auto-generate columns. Run DB migration to enable full execution."}
          JSON
            else
              cat response.json | jq .
              echo "Auto generate endpoint returned HTTP ${HTTP_CODE}"
              exit 1
            fi
          fi

          SUCCESS=$(jq -r '.success // false' response.json)
          if [ "${SUCCESS}" != "true" ] && [ "${OUTPUT_FILE}" = "response.json" ]; then
            cat response.json | jq .
            echo "Auto generate endpoint returned success=false"
            exit 1
          fi

          cat "${OUTPUT_FILE}" | jq .

          RESPONSE_DELIMITER="RESPONSE_$(date +%s%N)"
          {
            echo "response<<${RESPONSE_DELIMITER}"
            cat "${OUTPUT_FILE}"
            echo
            echo "${RESPONSE_DELIMITER}"
          } >> "$GITHUB_OUTPUT"

        id: trigger

      - name: Print summary
        env:
          RESPONSE: ${{ steps.trigger.outputs.response }}
          COMPATIBILITY_SKIP: ${{ steps.trigger.outputs.compatibility_skip }}
        run: |
          echo "$RESPONSE" | jq .
          if [ "${COMPATIBILITY_SKIP:-false}" = "true" ]; then
            echo "compatibility_skip=true (missing Account auto-generate columns in runtime DB)"
          fi
